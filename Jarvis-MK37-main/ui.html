<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — MARK XXXVII</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #5388d4;
  --gold-bright: #5aa0f0;
  --gold-dim: #3a5a9a;
  --gold-glow: rgba(83,136,212,0.6);
  --gold-glow-intense: rgba(90,160,240,0.9);
  --bg-deep: #0a0e14;
  --bg-panel: rgba(15,20,28,0.85);
  --bg-panel-border: rgba(83,136,212,0.25);
  --text-primary: #a3c5e8;
  --text-dim: #5a6a8a;
  --green: #4ae04a;
  --red: #e04a4a;
  --orange: #e0944a;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(83,136,212,0.03) 0%, transparent 70%),
    linear-gradient(180deg, rgba(10,14,20,1) 0%, rgba(15,20,30,1) 100%);
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(83,136,212,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(83,136,212,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }

.jarvis-container {
  position: relative; z-index: 1;
  width: 100%; height: 100vh;
  display: grid;
  grid-template-columns: 280px 1fr 380px;
  grid-template-rows: auto 1fr auto;
  gap: 16px; padding: 16px;
  max-width: 1600px; margin: 0 auto;
}

.header {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: center; gap: 20px;
  padding: 10px 0;
}
.header h1 {
  font-family: 'Orbitron', sans-serif; font-weight: 700;
  font-size: clamp(1.2rem, 3vw, 2rem);
  color: var(--gold-bright); letter-spacing: 4px;
  text-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(83,136,212,0.3);
}
.header .version {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem; color: var(--gold-dim);
  border: 1px solid var(--bg-panel-border);
  padding: 2px 10px; border-radius: 3px;
}
.state-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem; padding: 3px 14px; border-radius: 20px;
  border: 1px solid var(--gold-dim); color: var(--gold);
  text-transform: uppercase; letter-spacing: 2px;
  transition: all 0.5s;
}
.state-badge.idle { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(74,224,74,0.3); }
.state-badge.listening { border-color: var(--gold-bright); color: var(--gold-bright); box-shadow: 0 0 10px var(--gold-glow); }
.state-badge.processing { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 10px rgba(224,148,74,0.3); animation: processingPulse 0.8s infinite; }
.state-badge.responding { border-color: #4ac0e0; color: #4ac0e0; box-shadow: 0 0 10px rgba(74,192,224,0.3); }
.state-badge.error { border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(224,74,74,0.4); animation: errorShake 0.3s infinite; }

@keyframes processingPulse { 0%,100%{opacity:1}50%{opacity:0.5} }
@keyframes errorShake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)} }

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--bg-panel-border);
  border-radius: 4px; padding: 16px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}
.panel-title {
  font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: var(--gold-bright); letter-spacing: 3px;
  margin-bottom: 14px; text-transform: uppercase;
}

.left-col { display: flex; flex-direction: column; gap: 16px; }

.status-gauges { display: flex; gap: 16px; justify-content: center; }
.gauge { text-align: center; }
.gauge-ring { width: 70px; height: 70px; position: relative; }
.gauge-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.gauge-ring .bg { fill: none; stroke: rgba(83,136,212,0.1); stroke-width: 4; }
.gauge-ring .fill {
  fill: none; stroke: var(--gold); stroke-width: 4; stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
  filter: drop-shadow(0 0 4px var(--gold-glow));
}
.gauge-value {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem; color: var(--gold-bright);
}
.gauge-label {
  font-size: 0.65rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
}

.center-col {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; min-height: 0;
}
.core-wrapper {
  position: relative;
  width: clamp(320px, 50vw, 620px);
  height: clamp(320px, 50vw, 620px);
}
#coreCanvas { width: 100%; height: 100%; display: block; }

.mic-btn {
  position: absolute;
  bottom: -60px; left: 50%; transform: translateX(-50%);
  width: 50px; height: 50px; border-radius: 50%;
  border: 2px solid var(--gold);
  background: rgba(83,136,212,0.1);
  color: var(--gold-bright);
  font-size: 1.2rem; cursor: pointer;
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
.mic-btn:hover { background: rgba(83,136,212,0.2); box-shadow: 0 0 20px var(--gold-glow); }
.mic-btn.active { background: rgba(83,136,212,0.3); box-shadow: 0 0 30px var(--gold-glow-intense); animation: micPulse 1s infinite; }
.mic-btn.muted { border-color: var(--red); color: var(--red); background: rgba(224,74,74,0.1); animation: none; }
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 15px var(--gold-glow); }
  50% { box-shadow: 0 0 35px var(--gold-glow-intense); }
}

.right-col { display: flex; flex-direction: column; gap: 16px; min-height: 0; overflow: hidden; }

.conversation-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.conv-messages {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  padding-right: 4px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem; line-height: 1.6; min-height: 0;
}
.conv-messages::-webkit-scrollbar { width: 3px; }
.conv-messages::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
.conv-msg { padding: 6px 0; border-bottom: 1px solid rgba(83,136,212,0.08); word-wrap: break-word; }
.conv-msg .role { color: var(--gold-dim); font-size: 0.65rem; margin-bottom: 2px; }
.conv-msg .text { color: var(--text-primary); white-space: pre-wrap; }
.conv-msg.user .role { color: var(--gold); }
.conv-msg.ai .text { color: var(--gold-bright); }
.conv-msg.sys .role { color: var(--text-dim); }
.conv-msg.sys .text { color: var(--text-dim); font-style: italic; }
.conv-msg.err .role { color: var(--red); }
.conv-msg.err .text { color: var(--red); }

.conv-input-row { display: flex; gap: 8px; margin-top: 10px; }
.conv-input {
  flex: 1; background: rgba(83,136,212,0.05);
  border: 1px solid var(--bg-panel-border); border-radius: 4px;
  padding: 8px 12px; color: var(--text-primary);
  font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
  outline: none;
}
.conv-input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(83,136,212,0.15); }
.conv-send {
  background: rgba(83,136,212,0.15); border: 1px solid var(--gold-dim);
  color: var(--gold); padding: 8px 14px; border-radius: 4px; cursor: pointer;
  font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 1px;
  transition: all 0.3s;
}
.conv-send:hover { background: rgba(83,136,212,0.3); box-shadow: 0 0 10px var(--gold-glow); }

.task-queue-panel { flex-shrink: 0; }
.api-status-panel { flex-shrink: 0; }
.safety-panel { flex-shrink: 0; }
.safety-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.78rem; }
.safety-btn { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--bg-panel-border); background: rgba(83,136,212,0.08); color: var(--text-primary); cursor: pointer; transition: background 0.15s, border 0.15s; }
.safety-btn:hover { background: rgba(83,136,212,0.18); }
.safety-btn.kill { border-color: rgba(239,68,68,0.6); color: #ef4444; background: rgba(239,68,68,0.08); }
.safety-btn.kill:hover { background: rgba(239,68,68,0.25); }
.safety-btn.demo.on { border-color: rgba(240,160,75,0.6); color: #f0a04b; background: rgba(240,160,75,0.12); }
.safety-state { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-dim); }
.safety-state .on { color: #f0a04b; font-weight: bold; }
.safety-state .off { color: #25d97d; }
.api-list { display: flex; flex-direction: column; gap: 6px; }
.api-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.78rem; }
.api-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
.api-dot.ready    { color: #5388d4; background: #5388d4; }
.api-dot.active   { color: #25d97d; background: #25d97d; animation: processingPulse 1.2s infinite; }
.api-dot.cooldown { color: #f0a04b; background: #f0a04b; }
.api-dot.no_key   { color: #555;    background: #555; box-shadow: none; }
.api-name { flex: 1; color: var(--text-primary); font-family: 'Share Tech Mono', monospace; }
.api-name.last { color: #25d97d; font-weight: bold; }
.api-meta { font-size: 0.7rem; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; min-width: 70px; text-align: right; }
.api-usage-bar { width: 100%; height: 3px; background: rgba(83,136,212,0.1); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.api-usage-fill { height: 100%; background: linear-gradient(90deg, #25d97d, #f0a04b); border-radius: 2px; transition: width .4s ease; }
.api-usage-fill.warn { background: linear-gradient(90deg, #f0a04b, #ef4444); }
.api-usage-fill.crit { background: #ef4444; }
.api-row-wrap { display: flex; flex-direction: column; flex: 1; }
.task-list { display: flex; flex-direction: column; gap: 10px; max-height: 260px; overflow-y: auto; padding-right: 4px; }
.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-thumb { background: rgba(83,136,212,0.3); border-radius: 3px; }
.task-queue-actions { display: flex; gap: 6px; align-items: center; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--bg-panel-border); }
.task-queue-actions .count { flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-dim); }
.task-cancel { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; padding: 0 4px; opacity: 0.6; transition: opacity 0.15s, color 0.15s; }
.task-cancel:hover { opacity: 1; color: #ef4444; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.task-bar { width: 4px; height: 30px; background: var(--gold); border-radius: 2px; box-shadow: 0 0 6px var(--gold-glow); }
.task-info { flex: 1; }
.task-name { font-size: 0.8rem; color: var(--text-primary); }
.task-progress { width: 100%; height: 3px; background: rgba(83,136,212,0.1); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.task-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright)); border-radius: 2px; transition: width 1s ease; box-shadow: 0 0 6px var(--gold-glow); }
.task-status { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; width: 28px; text-align: center; }
.task-status.done { color: var(--green); }
.task-status.running { color: var(--orange); animation: processingPulse 1s infinite; }
.task-status.pending { color: var(--text-dim); }
.task-voice { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
.task-voice.v1 { background: rgba(37,217,125,0.15);  color: #25d97d; border: 1px solid rgba(37,217,125,0.4); }
.task-voice.v2 { background: rgba(83,136,212,0.15);  color: #5388d4; border: 1px solid rgba(83,136,212,0.4); }
.task-voice.v3 { background: rgba(168,85,247,0.15);  color: #a855f7; border: 1px solid rgba(168,85,247,0.4); }
.task-voice.v4 { background: rgba(239,68,68,0.15);   color: #ef4444; border: 1px solid rgba(239,68,68,0.4); }

.waveform-row {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 8px 0;
}
#waveCanvas { width: 100%; max-width: 700px; height: 50px; }
.waveform-label {
  font-family: 'Orbitron', sans-serif; font-size: 0.6rem;
  letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase;
}

@media (max-width: 1100px) {
  .jarvis-container {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto auto auto;
    height: auto; min-height: 100vh; overflow-y: auto;
  }
  .left-col, .right-col { flex-direction: row; flex-wrap: wrap; gap: 12px; }
  .left-col > .panel, .right-col > .panel { flex: 1; min-width: 200px; }
  .core-wrapper { width: 280px; height: 280px; }
  .center-col { padding: 40px 0 70px; }
}

.typing-cursor {
  display: inline-block; width: 6px; height: 12px;
  background: var(--gold-bright);
  animation: blink 0.6s step-end infinite;
  vertical-align: middle; margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

.scanline {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  pointer-events: none; z-index: 999;
}
</style>
</head>
<body>

<div class="scanline"></div>

<div class="jarvis-container">
  <div class="header">
    <h1>J.A.R.V.I.S.</h1>
    <span class="version">MARK XXXVII</span>
    <span class="state-badge idle" id="stateBadge">● IDLE</span>
  </div>

  <div class="left-col">
    <div class="panel">
      <div class="panel-title">System Status</div>
      <div class="status-gauges">
        <div class="gauge">
          <div class="gauge-ring">
            <svg viewBox="0 0 80 80">
              <circle class="bg" cx="40" cy="40" r="34"/>
              <circle class="fill" id="cpuArc" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="117.5"/>
            </svg>
            <div class="gauge-value" id="cpuVal">45%</div>
          </div>
          <div class="gauge-label">CPU</div>
        </div>
        <div class="gauge">
          <div class="gauge-ring">
            <svg viewBox="0 0 80 80">
              <circle class="bg" cx="40" cy="40" r="34"/>
              <circle class="fill" id="memArc" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="85.4"/>
            </svg>
            <div class="gauge-value" id="memVal">60%</div>
          </div>
          <div class="gauge-label">Memory</div>
        </div>
        <div class="gauge">
          <div class="gauge-ring">
            <svg viewBox="0 0 80 80">
              <circle class="bg" cx="40" cy="40" r="34"/>
              <circle class="fill" id="aiArc" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="42.7"/>
            </svg>
            <div class="gauge-value" id="aiVal">80%</div>
          </div>
          <div class="gauge-label">AI Core</div>
        </div>
      </div>
    </div>

    <div class="panel task-queue-panel">
      <div class="panel-title" title="Foreground requests run in parallel — they DON'T cancel a running mission. To stop a mission, ask Jarvis explicitly: 'annule la mission X' / 'cancel task X'.">Task Queue ⓘ</div>
      <div class="task-queue-actions">
        <span class="count" id="taskCount">0 tasks</span>
        <button class="safety-btn" onclick="clearDoneTasks()" title="Supprime les missions terminées">Clear done</button>
        <button class="safety-btn kill" onclick="cancelAllPending()" title="Annule toutes les missions en attente">Cancel pending</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="task-item">
          <div class="task-bar"></div>
          <div class="task-info">
            <div class="task-name" style="color:var(--text-dim)">No active tasks</div>
            <div class="task-progress"><div class="task-progress-fill" style="width:0%"></div></div>
          </div>
          <div class="task-status pending">⏳</div>
        </div>
      </div>
    </div>

    <div class="panel api-status-panel">
      <div class="panel-title">API Status</div>
      <div class="api-list" id="apiList">
        <div class="api-row"><div class="api-dot no_key"></div><div class="api-name">loading...</div></div>
      </div>
    </div>

    <div class="panel safety-panel">
      <div class="panel-title" title="Phase 7.5 Safety Net — kill switch global, demo mode, rollback dernière action">Safety Net</div>
      <div class="safety-row">
        <span class="safety-state">Demo:</span>
        <span class="safety-state" id="demoState"><span class="off">OFF</span></span>
        <button class="safety-btn demo" id="demoToggle" onclick="toggleDemo()">Toggle</button>
      </div>
      <div class="safety-row">
        <button class="safety-btn" onclick="rollbackLast()">↶ Rollback last</button>
        <button class="safety-btn kill" onclick="killSwitch()" title="Ctrl+Alt+Esc">🟥 Kill</button>
      </div>
      <div class="safety-row">
        <span class="safety-state" id="lastAction" style="font-size:0.65rem">last: —</span>
      </div>
    </div>
  </div>

  <div class="center-col">
    <div class="core-wrapper">
      <canvas id="coreCanvas"></canvas>
    </div>
    <button class="mic-btn" id="micBtn" title="Toggle mute (F4)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <div class="right-col">
    <div class="panel conversation-panel">
      <div class="panel-title">Conversation</div>
      <div class="conv-messages" id="convMessages"></div>
      <div class="conv-input-row">
        <input class="conv-input" id="convInput" type="text" placeholder="Enter command..." autocomplete="off"/>
        <button class="conv-send" id="convSend">SEND</button>
      </div>
    </div>
  </div>

  <div class="waveform-row">
    <canvas id="waveCanvas"></canvas>
    <div class="waveform-label" id="waveLabel">Voice Input Active</div>
  </div>
</div>

<script>
/* ═══════════ STATE MACHINE ═══════════ */
const STATES = { IDLE:'idle', LISTENING:'listening', PROCESSING:'processing', RESPONDING:'responding', ERROR:'error' };
let currentState = STATES.IDLE;
let stateStartTime = performance.now();
let isMuted = false;

function _applyStateVisual(newState) {
  const badge = document.getElementById('stateBadge');
  const labels = { idle:'● IDLE', listening:'◉ LISTENING', processing:'⟳ PROCESSING', responding:'◈ RESPONDING', error:'✕ ERROR' };
  badge.className = 'state-badge ' + newState;
  badge.textContent = labels[newState];
  const mic = document.getElementById('micBtn');
  mic.classList.toggle('active', newState === STATES.LISTENING && !isMuted);
}

function setState(newState) {
  if (!Object.values(STATES).includes(newState)) newState = STATES.IDLE;
  currentState = newState;
  stateStartTime = performance.now();
  _applyStateVisual(newState);
  setT(newState);
}

/* Python → JS bridge */
window.jarvisSetState = function(s) { setState(s); };
window.jarvisAddMessage = function(role, text) { addMessage(role, text); };
window.jarvisSetMuted = function(m) {
  isMuted = !!m;
  document.getElementById('micBtn').classList.toggle('muted', isMuted);
  document.getElementById('waveLabel').textContent = isMuted ? 'Microphone Muted' : 'Voice Input Active';
};

/* ═══════════ GAUGES ═══════════ */
const circumference = 2 * Math.PI * 34;
const gauges = {
  cpu: { el: document.getElementById('cpuArc'), valEl: document.getElementById('cpuVal'), current: 45 },
  mem: { el: document.getElementById('memArc'), valEl: document.getElementById('memVal'), current: 60 },
  ai:  { el: document.getElementById('aiArc'),  valEl: document.getElementById('aiVal'),  current: 80 }
};
function updateGauge(g, value) {
  g.current = value;
  g.el.style.strokeDashoffset = circumference * (1 - value / 100);
  g.valEl.textContent = Math.round(value) + '%';
}
function animateGauges() {
  const m = {
    idle:       { cpu:[40,50], mem:[55,65], ai:[75,85] },
    listening:  { cpu:[50,65], mem:[60,70], ai:[85,92] },
    processing: { cpu:[70,95], mem:[75,90], ai:[90,99] },
    responding: { cpu:[55,70], mem:[65,75], ai:[88,95] },
    error:      { cpu:[30,40], mem:[50,60], ai:[20,40] }
  }[currentState];
  for (const [k,g] of Object.entries(gauges)) {
    const [mn,mx] = m[k];
    const target = mn + Math.random()*(mx-mn);
    updateGauge(g, g.current + (target - g.current)*0.05);
  }
  requestAnimationFrame(animateGauges);
}
animateGauges();

const coreCanvas = document.getElementById('coreCanvas');
const ctx = coreCanvas.getContext('2d');
function resizeCore() {
  const rect = coreCanvas.parentElement.getBoundingClientRect();
  const s = Math.min(rect.width, rect.height);

window.addEventListener('resize', resizeCore);

let coreTime = 0;
let lastFrame = performance.now();

const P = { rot:0.3, glow:0.35, pSpd:0.5, energy:0.45, pulse:1.2, heat:0.45, err:0, shake:0, ringExpand:0, scanAlpha:0 };
const T = { ...P };
function lerpP() { for (const k in P) P[k] += (T[k]-P[k]) * 0.02; }
function setT(s) {
  switch (s) {
    case STATES.IDLE:       Object.assign(T,{rot:0.3,glow:0.35,pSpd:0.5,energy:0.45,pulse:1.2,heat:0.45,err:0,shake:0,ringExpand:0,scanAlpha:0}); break;
    case STATES.LISTENING:  Object.assign(T,{rot:0.5,glow:0.6,pSpd:0.8,energy:0.72,pulse:2.5,heat:0.6,err:0,shake:0,ringExpand:0.03,scanAlpha:0}); break;
    case STATES.PROCESSING: Object.assign(T,{rot:1.6,glow:0.8,pSpd:2,energy:1,pulse:5,heat:0.95,err:0,shake:0,ringExpand:0,scanAlpha:0.8}); break;
    case STATES.RESPONDING: Object.assign(T,{rot:0.65,glow:0.55,pSpd:0.9,energy:0.72,pulse:2,heat:0.6,err:0,shake:0,ringExpand:0.05,scanAlpha:0}); break;
    case STATES.ERROR:      Object.assign(T,{rot:0.1,glow:0.7,pSpd:0.05,energy:0.25,pulse:14,heat:0.15,err:1,shake:4,ringExpand:0,scanAlpha:0}); break;
  }
}
setT(STATES.IDLE);

function rX(p,a){const c=Math.cos(a),s=Math.sin(a);return[p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c];}
function rY(p,a){const c=Math.cos(a),s=Math.sin(a);return[p[0]*c+p[2]*s,p[1],-p[0]*s+p[2]*c];}
function rZ(p,a){const c=Math.cos(a),s=Math.sin(a);return[p[0]*c-p[1]*s,p[0]*s+p[1]*c,p[2]];}
function pj(p,cx,cy,sc){const fov=1.8;const z=p[2]+fov;const f=fov/z;return[cx+p[0]*sc*f,cy+p[1]*sc*f,z,f];}

const rings = [];
for (let i=0; i<40; i++) {
  rings.push({
    tiltX:(i/40)*Math.PI+(i%3)*0.2,
    tiltY:(i*2.399)%(Math.PI*2),
    tiltZ:(i*1.17)%Math.PI*0.3,
    arcStart:(i*0.618)%(Math.PI*2),
    arcLen:(0.4+(i%5)*0.15)*Math.PI,
    radius:0.24+(i%7)*0.028,
    speed:(0.1+(i%4)*0.08)*(i%2===0?1:-1),
    width:1+(i%5)*0.6,
    brightness:0.22+(i%6)*0.13,
    layer:i/40,
  });
}
const innerRings = [];
for (let i=0; i<16; i++) {
  innerRings.push({
    tiltX:(i*0.785)%Math.PI,
    tiltY:(i*2.094)%(Math.PI*2),
    radius:0.1+(i%5)*0.03,
    arcStart:(i*1.2)%6.28,
    arcLen:0.5*Math.PI+(i%3)*0.3*Math.PI,
    speed:(0.15+(i%3)*0.12)*(i%2===0?1:-1),
    width:1.2+(i%3)*0.8,
    brightness:0.4+(i%4)*0.15,
  });
}
const hazeRings = [];
for (let i=0; i<10; i++) {
  hazeRings.push({
    tiltX:(i*0.628)%Math.PI,
    tiltY:(i*1.885)%(Math.PI*2),
    radius:0.38+(i%4)*0.03,
    speed:(0.02+(i%3)*0.015)*(i%2===0?1:-1),
    width:1.5+(i%3)*1,
    opacity:0.03+(i%3)*0.018,
  });
}
const particles = [];
for (let i=0; i<600; i++) {
  const onShell = Math.random() > 0.3;
  particles.push({
    theta: Math.random()*6.2832,
    phi: Math.acos(2*Math.random()-1),
    r: onShell ? (0.26+Math.random()*0.16) : (0.04+Math.random()*0.34),
    spdT:(0.003+Math.random()*0.01)*(Math.random()>0.5?1:-1),
    spdP:(0.001+Math.random()*0.004)*(Math.random()>0.5?1:-1),
    size:0.4+Math.random()*2.8,
    bright:0.15+Math.random()*0.85,
    phase:Math.random()*6.28,
    flickSpd:1+Math.random()*4,
  });
}
const embers = [];
for (let i=0; i<80; i++) {
  embers.push({
    theta:Math.random()*6.28, phi:Math.acos(2*Math.random()-1),
    r0:0.32+Math.random()*0.06, rMax:0.48+Math.random()*0.14,
    life:Math.random(), size:0.2+Math.random()*0.8, tail:3,
  });
}
const glowCvs = document.createElement('canvas');
const gCtx = glowCvs.getContext('2d');
function syncGlow(){ glowCvs.width=coreCanvas.width; glowCvs.height=coreCanvas.height; }
syncGlow();
const _oRC = resizeCore;
resizeCore = function(){ _oRC(); syncGlow(); };

function draw3DArc(target, ring, timeOffset, cx, cy, sc, gRY, gRX, gRZ, expand) {
  const samples=48, pts=[], r=ring.radius+expand;
  for (let i=0; i<=samples; i++) {
    const t=i/samples;
    const a=ring.arcStart+t*ring.arcLen+timeOffset;
    let p=[Math.cos(a)*r, Math.sin(a)*r, 0];
    p=rX(p,ring.tiltX); p=rY(p,ring.tiltY);
    if (ring.tiltZ) p=rZ(p,ring.tiltZ);
    p=rY(p,gRY); p=rX(p,gRX); p=rZ(p,gRZ);
    const [sx,sy]=pj(p,cx,cy,sc);
    pts.push([sx,sy]);
  }
  if (pts.length<2) return;
  target.beginPath();
  target.moveTo(pts[0][0], pts[0][1]);
  for (let i=0; i<pts.length-1; i++) {
    const c=pts[i], n=pts[i+1];
    target.quadraticCurveTo(c[0], c[1], (c[0]+n[0])*0.5, (c[1]+n[1])*0.5);
  }
  const last = pts[pts.length-1];
  target.lineTo(last[0], last[1]);
}

function drawCore(now) {
  const dt = Math.min(0.033, (now-lastFrame)/1000);
  lastFrame = now; coreTime += dt; lerpP();
  const w=coreCanvas.width, h=coreCanvas.height;
  const cx=w/2, cy=h/2, sc=w/2, dpr=devicePixelRatio;
  ctx.clearRect(0,0,w,h); gCtx.clearRect(0,0,w,h);
  const eM = P.err*(0.5+0.5*Math.sin(coreTime*15));
  const cR=235+eM*10|0, cG=145-eM*55|0, cB=40-eM*15|0;
  const bR=255, bG=175-eM*70|0, bB=55-eM*30|0;
  const dR=190+eM*30|0, dG=80-eM*20|0, dB=10;
  const gRY=coreTime*0.3*P.rot;
  const gRX=Math.sin(coreTime*0.1)*0.32;
  const gRZ=coreTime*0.07*P.rot;
  const pulse=0.5+0.5*Math.sin(coreTime*P.pulse);
  const expand=P.ringExpand*Math.sin(coreTime*P.pulse*0.7);

  const g0 = ctx.createRadialGradient(cx,cy,0,cx,cy,sc*0.95);
  g0.addColorStop(0, `rgba(${bR},${bG},${bB},${P.glow*0.35})`);
  g0.addColorStop(0.15, `rgba(${cR},${cG},${cB},${P.glow*0.2})`);
  g0.addColorStop(0.4, `rgba(${dR},${dG},${dB},${P.glow*0.06})`);
  g0.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=g0; ctx.fillRect(0,0,w,h);

  ctx.lineCap='butt'; gCtx.lineCap='butt';
  for (const hr of hazeRings) {
    const tOff = coreTime*hr.speed;
    draw3DArc(ctx, {tiltX:hr.tiltX,tiltY:hr.tiltY,tiltZ:0,arcStart:0,arcLen:Math.PI*2,radius:hr.radius}, tOff, cx, cy, sc, gRY, gRX, gRZ, expand*0.5);
    ctx.strokeStyle=`rgba(${cR},${cG},${cB},${hr.opacity*P.energy})`;
    ctx.lineWidth=hr.width*dpr; ctx.stroke();
  }
  for (const ring of rings) {
    const tOff = coreTime*ring.speed;
    const alpha = ring.brightness*P.energy*(0.6+0.4*Math.sin(coreTime*0.7+ring.tiltX*2));
    if (alpha<0.03) continue;
    const hot = ring.layer>0.5;
    draw3DArc(ctx, ring, tOff, cx, cy, sc, gRY, gRX, gRZ, expand);
    ctx.strokeStyle = hot ? `rgba(${bR},${bG},${bB},${Math.min(0.9,alpha*1.5)})` : `rgba(${cR},${cG},${cB},${Math.min(0.8,alpha*1.2)})`;
    ctx.lineWidth = ring.width*dpr*(0.8+0.3*P.energy);
    ctx.stroke();
    if (alpha>0.06) {
      draw3DArc(gCtx, ring, tOff, cx, cy, sc, gRY, gRX, gRZ, expand);
      gCtx.strokeStyle = hot ? `rgba(${bR},${bG},${bB},${Math.min(0.4,alpha*0.5)})` : `rgba(${cR},${cG},${cB},${Math.min(0.3,alpha*0.4)})`;
      gCtx.lineWidth = (ring.width+5)*dpr;
      gCtx.stroke();
    }
  }
  for (const ir of innerRings) {
    const tOff = coreTime*ir.speed;
    const alpha = ir.brightness*P.energy*(0.5+0.5*Math.sin(coreTime*1.2+ir.tiltX*3));
    if (alpha<0.04) continue;
    draw3DArc(ctx, {tiltX:ir.tiltX,tiltY:ir.tiltY,tiltZ:0,arcStart:ir.arcStart,arcLen:ir.arcLen,radius:ir.radius}, tOff, cx, cy, sc, gRY, gRX, gRZ, 0);
    ctx.strokeStyle=`rgba(${bR},${bG},${bB},${Math.min(0.85,alpha*1.3)})`;
    ctx.lineWidth=ir.width*dpr; ctx.stroke();
    draw3DArc(gCtx, {tiltX:ir.tiltX,tiltY:ir.tiltY,tiltZ:0,arcStart:ir.arcStart,arcLen:ir.arcLen,radius:ir.radius}, tOff, cx, cy, sc, gRY, gRX, gRZ, 0);
    gCtx.strokeStyle=`rgba(${bR},${bG},${bB},${Math.min(0.35,alpha*0.5)})`;
    gCtx.lineWidth=(ir.width+5)*dpr; gCtx.stroke();
  }
  if (P.scanAlpha>0.01) {
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(coreTime*2);
    const sg = ctx.createConicGradient(0,0,0);
    sg.addColorStop(0, `rgba(${bR},${bG},${bB},${0.15*P.scanAlpha})`);
    sg.addColorStop(0.04, `rgba(${cR},${cG},${cB},${0.04*P.scanAlpha})`);
    sg.addColorStop(0.09, 'rgba(0,0,0,0)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,sc*0.5,0,6.28); ctx.fill();
    ctx.restore();
  }
  const projP=[];
  for (const p of particles) {
    p.theta += p.spdT*P.pSpd*dt*60;
    p.phi   += p.spdP*P.pSpd*dt*60*0.3;
    const r=p.r;
    let p3=[r*Math.sin(p.phi)*Math.cos(p.theta), r*Math.sin(p.phi)*Math.sin(p.theta), r*Math.cos(p.phi)];
    p3=rY(p3,gRY); p3=rX(p3,gRX);
    const [sx,sy,sz,f]=pj(p3,cx,cy,sc);
    const depthB = 0.25+0.75*Math.max(0,Math.min(1,sz/2.6));
    const flicker = 0.5+0.5*Math.sin(coreTime*p.flickSpd+p.phase);
    const alpha = p.bright*depthB*flicker*P.energy;
    projP.push({sx,sy,sz,alpha, s:p.size*dpr*f*(0.5+0.5*P.energy)});
  }
  projP.sort((a,b)=>a.sz-b.sz);
  for (const pp of projP) {
    if (pp.alpha<0.025) continue;
    const hot = pp.alpha>0.42;
    ctx.fillStyle = hot ? `rgba(${bR},${bG},${bB},${Math.min(0.85,pp.alpha)})` : `rgba(${cR},${cG},${cB},${Math.min(0.65,pp.alpha)})`;
    ctx.beginPath(); ctx.arc(pp.sx,pp.sy,Math.max(0.2,pp.s),0,6.28); ctx.fill();
    if (hot && pp.alpha>0.55) {
      gCtx.fillStyle = `rgba(${bR},${bG},${bB},${pp.alpha*0.25})`;
      gCtx.beginPath(); gCtx.arc(pp.sx,pp.sy,pp.s*2.5,0,6.28); gCtx.fill();
    }
  }
  for (const e of embers) {
    e.life += 0.004*P.pSpd*dt*60;
    if (e.life>1){ e.life=0; e.theta=Math.random()*6.28; e.phi=Math.acos(2*Math.random()-1); }
    for (let t=0; t<e.tail; t++) {
      const life = Math.max(0, e.life-t*0.012);
      const r = e.r0+life*(e.rMax-e.r0);
      let p3=[r*Math.sin(e.phi)*Math.cos(e.theta), r*Math.sin(e.phi)*Math.sin(e.theta), r*Math.cos(e.phi)];
      p3=rY(p3,gRY); p3=rX(p3,gRX);
      const [sx,sy,,f]=pj(p3,cx,cy,sc);
      const fade=(1-life)*(1-life), tF=1-t/e.tail, a=fade*tF*0.45*P.energy;
      if (a<0.01) continue;
      ctx.fillStyle=`rgba(${bR},${bG},${bB},${a})`;
      ctx.beginPath(); ctx.arc(sx,sy,Math.max(0.1,e.size*dpr*f*tF),0,6.28); ctx.fill();
    }
  }
  const coreR = sc*(0.09+0.02*pulse)*(0.6+0.4*P.heat);
  const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cg.addColorStop(0, `rgba(255,255,240,${0.95*P.heat})`);
  cg.addColorStop(0.12, `rgba(${bR},${bG},${bB},${0.8*P.heat})`);
  cg.addColorStop(0.38, `rgba(${cR},${cG},${cB},${0.35*P.heat})`);
  cg.addColorStop(0.7, `rgba(${dR},${dG},${dB},${0.08*P.heat})`);
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,coreR,0,6.28); ctx.fill();
  const blR=sc*(0.18+0.04*Math.sin(coreTime*P.pulse*0.4));
  const bg2=ctx.createRadialGradient(cx,cy,0,cx,cy,blR);
  bg2.addColorStop(0, `rgba(${bR},${bG},${bB},${0.25*P.heat*pulse})`);
  bg2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(cx,cy,blR,0,6.28); ctx.fill();
  gCtx.fillStyle=`rgba(${bR},${bG},${bB},${0.2*P.heat})`;
  gCtx.beginPath(); gCtx.arc(cx,cy,sc*0.12,0,6.28); gCtx.fill();
  if (currentState===STATES.LISTENING) {
    const el=(performance.now()-stateStartTime)/1000;
    for (let i=0; i<4; i++) {
      const t=((el*0.3+i*0.25)%1);
      const r=sc*(0.36+t*0.25);
      ctx.beginPath(); ctx.arc(cx,cy,r,0,6.28);
      ctx.strokeStyle=`rgba(${cR},${cG},${cB},${(1-t)*(1-t)*0.2})`;
      ctx.lineWidth=(2-t*1.5)*dpr; ctx.stroke();
    }
  }
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.filter=`blur(${12*dpr|0}px)`;
  ctx.drawImage(glowCvs,0,0);
  ctx.filter=`blur(${4*dpr|0}px)`;
  ctx.globalAlpha=0.45;
  ctx.drawImage(glowCvs,0,0);
  ctx.globalAlpha=1; ctx.filter='none';
  ctx.globalCompositeOperation='source-over';
  ctx.restore();
  if (P.shake>0.1) coreCanvas.style.transform=`translate(${(Math.random()-0.5)*P.shake}px,${(Math.random()-0.5)*P.shake}px)`;
  else coreCanvas.style.transform='';
  requestAnimationFrame(drawCore);
}
requestAnimationFrame(drawCore);

const waveCanvas = document.getElementById('waveCanvas');
const wCtx = waveCanvas.getContext('2d');
function resizeWave() {
  const rect = waveCanvas.parentElement.getBoundingClientRect();
  waveCanvas.width = Math.min(700, rect.width-40) * devicePixelRatio;
  waveCanvas.height = 50 * devicePixelRatio;
  waveCanvas.style.width = Math.min(700, rect.width-40) + 'px';
  waveCanvas.style.height = '50px';
}
resizeWave();
window.addEventListener('resize', resizeWave);
let waveTime = 0;
function drawWave() {
  const w = waveCanvas.width, h = waveCanvas.height;
  wCtx.clearRect(0, 0, w, h);
  waveTime += 0.03;
  const bars = 80, barW = w/bars, cy = h/2;
  let amplitude = 0.15;
  if (isMuted) amplitude = 0.02;
  else if (currentState === STATES.LISTENING)  amplitude = 0.6  + 0.2  * Math.sin(waveTime*3);
  else if (currentState === STATES.PROCESSING) amplitude = 0.35 + 0.1  * Math.sin(waveTime*5);
  else if (currentState === STATES.RESPONDING) amplitude = 0.4  + 0.15 * Math.sin(waveTime*2);
  else if (currentState === STATES.ERROR)      amplitude = 0.1;
  for (let i=0; i<bars; i++) {
    const x = i*barW, normI = i/bars;
    const envGauss = Math.exp(-Math.pow((normI-0.5)*3, 2));
    const val = Math.sin(normI*12+waveTime*4)*0.5 + Math.sin(normI*7-waveTime*2.5)*0.3 + Math.sin(normI*20+waveTime*6)*0.2;
    const barH = Math.abs(val)*amplitude*h*envGauss;
    const alpha = 0.4+0.5*envGauss;
    wCtx.fillStyle = (currentState === STATES.ERROR) ? `rgba(224,90,60,${alpha})` : (isMuted ? `rgba(224,74,74,${alpha*0.6})` : `rgba(83,136,212,${alpha})`);
    wCtx.fillRect(x+1, cy-barH/2, barW-2, barH);
  }
  requestAnimationFrame(drawWave);
}
requestAnimationFrame(drawWave);

/* ═══════════ CONVERSATION + PYWEBVIEW BRIDGE ═══════════ */
const convMessages = document.getElementById('convMessages');
const convInput = document.getElementById('convInput');
const convSend = document.getElementById('convSend');
const micBtn = document.getElementById('micBtn');

function addMessage(role, text) {
  role = role || 'sys';
  const cls = (role === 'user' || role === 'ai' || role === 'err' || role === 'sys') ? role : 'sys';
  const label = { user:'[USER]', ai:'[AI] J.A.R.V.I.S.', sys:'[SYS]', err:'[ERR]' }[cls];
  const div = document.createElement('div');
  div.className = 'conv-msg ' + cls;
  const roleDiv = document.createElement('div'); roleDiv.className='role'; roleDiv.textContent=label;
  const textDiv = document.createElement('div'); textDiv.className='text'; textDiv.textContent=text;
  div.appendChild(roleDiv); div.appendChild(textDiv);
  convMessages.appendChild(div);
  convMessages.scrollTop = convMessages.scrollHeight;
  // Cap log to 400 messages
  while (convMessages.childElementCount > 400) convMessages.removeChild(convMessages.firstChild);
  return div;
}

// ── Streaming AI bubble (synchronisé avec la voix) ─────────────────────────
let _streamingAiBubble = null;
window.jarvisStreamAi = function(chunk) {
  if (!chunk) return;
  if (!_streamingAiBubble) {
    _streamingAiBubble = addMessage('ai', '');
  }
  const textDiv = _streamingAiBubble.querySelector('.text');
  if (textDiv) {
    textDiv.textContent = (textDiv.textContent || '') + chunk;
    convMessages.scrollTop = convMessages.scrollHeight;
  }
};
window.jarvisFinalizeAi = function() {
  _streamingAiBubble = null;
};

// ── Streaming USER bubble (transcription live de la voix) ──────────────────
let _streamingUserBubble = null;
window.jarvisStreamUser = function(chunk) {
  if (!chunk) return;
  if (!_streamingUserBubble) {
    _streamingUserBubble = addMessage('user', '');
  }
  const textDiv = _streamingUserBubble.querySelector('.text');
  if (textDiv) {
    textDiv.textContent = (textDiv.textContent || '') + chunk;
    convMessages.scrollTop = convMessages.scrollHeight;
  }
};
window.jarvisFinalizeUser = function() {
  _streamingUserBubble = null;
};

function callPy(fn, ...args) {
  if (window.pywebview && window.pywebview.api && window.pywebview.api[fn]) {
    try { return window.pywebview.api[fn](...args); } catch (e) { console.error(e); }
  }
  return null;
}

function sendText() {
  const text = (convInput.value || '').trim();
  if (!text) return;
  convInput.value = '';
  addMessage('user', text);
  callPy('send_text', text);
}
convSend.addEventListener('click', sendText);
convInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });

micBtn.addEventListener('click', () => { callPy('toggle_mute'); });
document.addEventListener('keydown', e => { if (e.key === 'F4') callPy('toggle_mute'); });

function bootstrap() {
  const p = callPy('get_initial_state');
  if (p && typeof p.then === 'function') {
    p.then(s => { if (s) { if (s.muted !== undefined) window.jarvisSetMuted(s.muted); } });
  }
}
window.addEventListener('pywebviewready', bootstrap);
setTimeout(bootstrap, 300);

// ── API Status panel — poll get_router_status() toutes les 5s ──────────────
const API_STATUS_LABELS = {
  ready:    '●',
  active:   '●',
  cooldown: '●',
  no_key:   '●',
};
const API_STATUS_TEXT = {
  ready:    'ready',
  active:   'in use',
  cooldown: 'cooldown',
  no_key:   'no key',
};

function renderApiStatus(data) {
  const list = document.getElementById('apiList');
  if (!list) return;
  if (!data || !Array.isArray(data.providers) || data.providers.length === 0) {
    list.innerHTML = '<div class="api-row"><div class="api-dot no_key"></div><div class="api-name">no providers configured</div></div>';
    return;
  }
  list.innerHTML = '';
  for (const row of data.providers) {
    const r = document.createElement('div'); r.className = 'api-row';
    const dot = document.createElement('div'); dot.className = 'api-dot ' + row.status;

    // Wrapper colonne : nom + barre d'usage en dessous
    const wrap = document.createElement('div'); wrap.className = 'api-row-wrap';
    const name = document.createElement('div'); name.className = 'api-name' + (row.is_last_used ? ' last' : '');
    name.textContent = row.provider;
    wrap.appendChild(name);

    // Barre d'usage tokens / requests (cachée si pas de données)
    if (row.usage && typeof row.usage.percent_used === 'number') {
      const bar  = document.createElement('div'); bar.className = 'api-usage-bar';
      const fill = document.createElement('div');
      const pct  = row.usage.percent_used;
      let cls = 'api-usage-fill';
      if (pct >= 90) cls += ' crit';
      else if (pct >= 70) cls += ' warn';
      fill.className = cls;
      fill.style.width = pct + '%';
      bar.appendChild(fill);
      wrap.appendChild(bar);
    }

    const meta = document.createElement('div'); meta.className = 'api-meta';
    if (row.status === 'cooldown') {
      meta.textContent = `cd ${row.cooldown_s}s`;
    } else if (row.usage && typeof row.usage.percent_used === 'number') {
      meta.textContent = `${row.usage.percent_used}% · ${row.usage.remaining_label}`;
    } else if (row.usage && row.usage.source === 'local') {
      meta.textContent = row.usage.remaining_label;
    } else {
      meta.textContent = (row.status === 'active') ? 'active' : 'ready';
    }

    r.appendChild(dot); r.appendChild(wrap); r.appendChild(meta);
    list.appendChild(r);
  }
}

function pollApiStatus() {
  const p = callPy('get_router_status');
  if (p && typeof p.then === 'function') {
    p.then(renderApiStatus).catch(() => {});
  } else if (p) {
    renderApiStatus(p);
  }
}
setInterval(pollApiStatus, 5000);
setTimeout(pollApiStatus, 800);

// ── Task Queue panel — poll get_task_queue() toutes les 2s ─────────────────
const TASK_STATUS_GLYPH = {
  pending:   '⏳',
  running:   '⟳',
  done:      '✓',
  failed:    '✗',
  cancelled: '⊘',
};
const TASK_STATUS_CLASS = {
  pending:   'pending',
  running:   'running',
  done:      'done',
  failed:    'pending',
  cancelled: 'pending',
};

function renderTaskQueue(data) {
  const list   = document.getElementById('taskList');
  const countE = document.getElementById('taskCount');
  if (!list) return;
  const tasks  = (data && Array.isArray(data.tasks)) ? data.tasks : [];
  const totals = (data && data.totals) || {};

  if (countE) {
    if (totals.total != null) {
      countE.textContent = `${totals.running||0} run · ${totals.pending||0} pend · ${totals.done||0} done`;
    } else {
      countE.textContent = `${tasks.length} tasks`;
    }
  }

  if (tasks.length === 0) {
    list.innerHTML = '<div class="task-item">'
      + '<div class="task-bar"></div>'
      + '<div class="task-info"><div class="task-name" style="color:var(--text-dim)">No active tasks</div>'
      + '<div class="task-progress"><div class="task-progress-fill" style="width:0%"></div></div></div>'
      + '<div class="task-status pending">⏳</div></div>';
    return;
  }

  const voiceLabels = { 1: 'V1·FAST', 2: 'V2·DEEP', 3: 'V3·MISSION', 4: 'V4·UNCENS' };
  list.innerHTML = '';
  for (const t of tasks) {
    const cls = TASK_STATUS_CLASS[t.status] || 'pending';
    const glyph = TASK_STATUS_GLYPH[t.status] || '·';
    const item = document.createElement('div'); item.className = 'task-item';
    const bar  = document.createElement('div'); bar.className = 'task-bar';
    const info = document.createElement('div'); info.className = 'task-info';

    const name = document.createElement('div'); name.className = 'task-name';
    const voiceN = (t.voice >= 1 && t.voice <= 4) ? t.voice : 3;
    const nameSpan = document.createElement('span');
    nameSpan.textContent = `${t.id} — ${t.name}`;
    const voiceBadge = document.createElement('span');
    voiceBadge.className = 'task-voice v' + voiceN;
    voiceBadge.textContent = voiceLabels[voiceN];
    name.appendChild(nameSpan);
    name.appendChild(voiceBadge);

    const prog = document.createElement('div'); prog.className = 'task-progress';
    const fill = document.createElement('div'); fill.className = 'task-progress-fill';
    const pct  = (t.status === 'done') ? 100 : (t.progress || 0);
    fill.style.width = pct + '%';
    prog.appendChild(fill);
    info.appendChild(name); info.appendChild(prog);

    const status = document.createElement('div');
    status.className = 'task-status ' + cls;
    status.textContent = glyph;

    item.appendChild(bar); item.appendChild(info); item.appendChild(status);

    if (t.cancellable) {
      const btn = document.createElement('button');
      btn.className = 'task-cancel';
      btn.textContent = '✕';
      btn.title = `Cancel ${t.id}`;
      btn.onclick = () => cancelTask(t.full_id || t.id);
      item.appendChild(btn);
    }
    list.appendChild(item);
  }
}

function cancelTask(missionId) {
  const p = callPy('cancel_task', missionId);
  Promise.resolve(p).then(res => {
    if (res && res.ok) addMessage('sys', `✕ Cancelled task ${res.id}`);
    else addMessage('err', `Cancel failed: ${(res && (res.reason || res.error)) || 'unknown'}`);
    pollTaskQueue();
  }).catch(() => {});
}

function clearDoneTasks() {
  const p = callPy('clear_done_tasks');
  Promise.resolve(p).then(res => {
    if (res && res.ok) addMessage('sys', `🧹 Cleared ${res.removed} done tasks`);
    pollTaskQueue();
  }).catch(() => {});
}

function cancelAllPending() {
  if (!confirm('Annuler toutes les missions en attente ? (Les running ne sont pas affectées)')) return;
  const p = callPy('cancel_all_pending');
  Promise.resolve(p).then(res => {
    if (res && res.ok) addMessage('sys', `✕ Cancelled ${res.cancelled} pending tasks`);
    pollTaskQueue();
  }).catch(() => {});
}

function pollTaskQueue() {
  const p = callPy('get_task_queue');
  if (p && typeof p.then === 'function') {
    p.then(renderTaskQueue).catch(() => {});
  } else if (p) {
    renderTaskQueue(p);
  }
}
setInterval(pollTaskQueue, 2000);
setTimeout(pollTaskQueue, 600);

// ── Safety Net panel — Phase 7.5 ────────────────────────────────────────────
function renderSafetyState(data) {
  if (!data) return;
  const stateEl = document.getElementById('demoState');
  const btnEl   = document.getElementById('demoToggle');
  const lastEl  = document.getElementById('lastAction');
  if (stateEl) {
    stateEl.innerHTML = data.demo_mode
      ? '<span class="on">ON</span>'
      : '<span class="off">OFF</span>';
  }
  if (btnEl) {
    btnEl.classList.toggle('on', !!data.demo_mode);
  }
  if (lastEl) {
    const hist = data.history || [];
    if (hist.length === 0) {
      lastEl.textContent = 'last: —';
    } else {
      const h = hist[0];
      const tag = h.rolled_back ? ' [↶]' : (h.rollbackable ? '' : ' [⊘]');
      lastEl.textContent = `last: ${h.name}${tag} — ${(h.summary||'').slice(0,40)}`;
    }
  }
}

function pollSafetyState() {
  const p = callPy('get_safety_state');
  if (p && typeof p.then === 'function') {
    p.then(renderSafetyState).catch(() => {});
  } else if (p) {
    renderSafetyState(p);
  }
}

function toggleDemo() {
  const p = callPy('toggle_demo_mode');
  Promise.resolve(p).then(() => pollSafetyState()).catch(() => {});
}

function rollbackLast() {
  const p = callPy('rollback_last_action');
  Promise.resolve(p).then(res => {
    if (res && res.ok) {
      addMessage('sys', `↶ Rollback OK: ${res.name} — ${res.result || ''}`);
    } else {
      addMessage('err', `↶ Rollback failed: ${(res && (res.reason || res.error)) || 'unknown'}`);
    }
    pollSafetyState();
  }).catch(() => {});
}

function killSwitch() {
  if (!confirm('Kill switch : stoppe les missions et active demo_mode. Confirmer ?')) return;
  const p = callPy('trigger_kill_switch');
  Promise.resolve(p).then(res => {
    addMessage('err', `🟥 KILL SWITCH triggered (${(res && res.stopped) || 0} module(s) stopped)`);
    pollSafetyState();
  }).catch(() => {});
}

setInterval(pollSafetyState, 3000);
setTimeout(pollSafetyState, 700);

setState(STATES.IDLE);
</script>
